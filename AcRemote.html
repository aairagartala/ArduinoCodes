      transition: background 0.3s;
    }

      background: #0072ff;
    }

    select {
      cursor: pointer;
      appearance: none;

      background-repeat: no-repeat;
      background-position: right 10px center;
      background-size: 20px;
      padding-right: 35px;
    }

    .displayBox {

  <script>
     

    

   



function gettemph() {
      var xhttp = new XMLHttpRequest();
      xhttp.onreadystatechange = function() {
        if (this.readyState == 4 && this.status == 200) {
          // Example response: "06:30"
           {
            document.getElementById("ttemprh").innerHTML=this.responseText.trim();
            
          }
        }
      };
      xhttp.open("GET", "b16", true); // <-- ESP32 must serve this
      xhttp.send();
    }
    setInterval(gettemph, 1000); 
    gettemph();

// ----------- SEND SELECTED STAGE TO ESP32 -------------
function sendStage() {
  let stageVal = document.getElementById("stageSelector").value;

  if (!stageVal) {
    alert("Please select a stage");
    return;
  }

  var xhttp = new XMLHttpRequest();
  xhttp.onreadystatechange = function() {
    if (this.readyState == 4 && this.status == 200) {
      console.log("Stage sent successfully: " + this.responseText);
      // Optional: Show success message or update UI
      alert("Stage updated: " + stageVal);
    }
  };

  xhttp.open("GET", "setstage?stage=" + stageVal, true);  
  xhttp.send();
}
